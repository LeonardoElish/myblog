<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>macOS Desktop 定制服务 - 报价单</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #fbfbfd;
      --bg-card: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      --radius: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 80px;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1d1d1f 0%, #424245 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 21px;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Pricing Cards */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 80px;
    }

    @media (max-width: 900px) {
      .pricing-grid {
        grid-template-columns: 1fr;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
      }
    }

    .pricing-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .pricing-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .pricing-card.featured {
      background: linear-gradient(180deg, #1d1d1f 0%, #2d2d30 100%);
      color: #fff;
      position: relative;
    }

    .pricing-card.featured::before {
      content: '推荐';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 16px;
      border-radius: 20px;
    }

    .pricing-card.featured .text-muted {
      color: rgba(255, 255, 255, 0.6);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header h3 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card-header .price {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-header .price span {
      font-size: 18px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .pricing-card.featured .price span {
      color: rgba(255, 255, 255, 0.6);
    }

    .card-header .duration {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .features {
      list-style: none;
      flex: 1;
      margin-bottom: 32px;
    }

    .features li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }

    .pricing-card.featured .features li {
      border-color: rgba(255, 255, 255, 0.1);
    }

    .features li:last-child {
      border-bottom: none;
    }

    .features li::before {
      content: '✓';
      color: #34c759;
      font-weight: 600;
      flex-shrink: 0;
    }

    .text-muted {
      color: var(--text-secondary);
    }

    .cta-btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .cta-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .cta-btn.primary:hover {
      background: var(--accent-hover);
    }

    .cta-btn.secondary {
      background: rgba(0, 113, 227, 0.1);
      color: var(--accent);
    }

    .cta-btn.secondary:hover {
      background: rgba(0, 113, 227, 0.15);
    }

    .pricing-card.featured .cta-btn.secondary {
      background: #fff;
      color: #1d1d1f;
    }

    /* Footer Note */
    .footer-note {
      text-align: center;
      padding: 40px;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .footer-note h4 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .footer-note p {
      color: var(--text-secondary);
      margin-bottom: 24px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .contact-email {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 18px;
      font-weight: 500;
      text-decoration: none;
    }

    .contact-email:hover {
      text-decoration: underline;
    }

    /* Watermark */
    .watermark {
      text-align: center;
      margin-top: 60px;
      color: var(--text-secondary);
      font-size: 13px;
    }
  </style>
</head>
